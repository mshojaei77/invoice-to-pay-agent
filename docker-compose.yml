# One-command demo:  docker compose up
# Starts both the FastAPI backend and the Streamlit review UI.
services:
  api:
    build:
      context: .
      target: api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./samples:/app/samples
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      target: ui
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./samples:/app/samples
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
